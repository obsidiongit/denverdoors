<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Preview</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .preview-container {
            max-width: 1200px;
            width: 100%;
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            margin-bottom: 2rem;
        }

        img {
            max-width: 100%;
            height: auto;
            border: 1px solid #444;
            border-radius: 8px;
            display: block;
        }

        .info {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>

    <!-- Open Graph Default -->
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://denverinteriordoors.com/assets/images/og-image-generated.jpg">
</head>

<body>
    <div class="preview-container">
        <div class="header">
            <h2>OpenGraph Image Preview</h2>
            <p>Target Resolution: 1200x630 (1.91:1 ratio)</p>
        </div>
        <img src="assets/images/og-image-generated.jpg" alt="Generated OG Image">
        <div class="info">
            <span>Size: 1200x630 px</span>
            <span>Format: JPEG</span>
            <span>Quality: High Quality Bicubic Interpolation</span>
        </div>
    </div>
</body>

</html>
